name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-13
            platform: macos
            arch: x64
          - os: macos-14
            platform: macos
            arch: arm64

    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: |
          requirements/requirements.txt
          requirements/requirements-dev.txt

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/requirements-dev.txt
        if [ "${{ runner.os }}" == "Windows" ]; then
          pip install pywin32
        fi

    - name: Install macOS build tools
      if: runner.os == 'macOS'
      run: |
        brew install create-dmg || true

    - name: Install Linux build tools
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev debhelper fakeroot

    - name: Record build metadata
      id: meta
      shell: bash
      run: |
        echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> "$GITHUB_ENV"
        if [ "${{ runner.os }}" == "Windows" ]; then
          echo "PYINSTALLER_SEP=;" >> "$GITHUB_ENV"
          echo "PYINSTALLER_ADD_DATA_FORMAT=--add-data" >> "$GITHUB_ENV"
        else
          echo "PYINSTALLER_SEP=:" >> "$GITHUB_ENV"
          echo "PYINSTALLER_ADD_DATA_FORMAT=--add-data=" >> "$GITHUB_ENV"
        fi

    - name: Build
      shell: bash
      env:
        JVMAN_DEB_MAINTAINER: "JVMan Maintainers <noreply@users.noreply.github.com>"
      run: |
        echo "============ Build Environment ============"
        echo "Target:        ${{ matrix.platform }}-${{ matrix.arch }}"
        echo "Runner OS:     ${{ runner.os }}"
        echo "Runner arch:   $(uname -m 2>/dev/null || echo unknown)"
        echo "Python:        $(python --version)"
        echo "Working dir:   $(pwd)"
        echo "==========================================="
        python scripts/build.py --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --type all

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: jvman-${{ matrix.platform }}-${{ matrix.arch }}-${{ env.timestamp }}
        path: |
          release/**/jvman-*.exe
          release/**/jvman-*.zip
          release/**/jvman-*.dmg
          release/**/jvman-*.deb
          release/**/jvman-*.sha256
          release/**/release.json
        if-no-files-found: warn
        retention-days: 7
