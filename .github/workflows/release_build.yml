name: Release Build

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

# 同一 ref 触发新 run 时取消之前未完成的 run，避免长时间排队卡死
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            platform: windows
            arch: x64
          # Linux x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          # Linux ARM64（GitHub 公共仓库可用的免费 ARM runner）
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          # macOS Intel (x86_64)
          # 在 Apple Silicon runner (macos-14) 上经 Rosetta 2 跨架构构建,
          # 规避 macos-13 公共 Intel 池排队拥堵 / 即将退役的问题
          - os: macos-14
            platform: macos
            arch: x64
            rosetta: true
          # macOS Apple Silicon (M 系列) - 原生构建
          - os: macos-14
            platform: macos
            arch: arm64

    runs-on: ${{ matrix.os }}
    # 单 job 执行（排队后）最长 60 分钟，超时直接失败
    timeout-minutes: 60

    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 非 Rosetta 路径：使用 setup-python action（原生 Python）
    - name: Set up Python (native)
      if: ${{ !matrix.rosetta }}
      uses: actions/setup-python@v5
      with:
        # 3.8 不支持 Apple Silicon 原生；统一升级到 3.11（LTS 周期内且三平台都有官方构建）
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: |
          requirements/requirements.txt
          requirements/requirements-dev.txt

    # Rosetta 路径：在 Apple Silicon runner 上安装 Rosetta 2 + universal2 Python，
    # 后续 step 通过 `arch -x86_64` 跨架构产出 x86_64 原生二进制
    - name: Install Rosetta 2 (cross-arch macOS x64)
      if: ${{ matrix.rosetta }}
      shell: bash
      run: |
        sudo softwareupdate --install-rosetta --agree-to-license

    - name: Install universal2 Python from python.org (cross-arch macOS x64)
      if: ${{ matrix.rosetta }}
      shell: bash
      run: |
        set -euo pipefail
        PY_VER="3.11.9"
        PKG="python-${PY_VER}-macos11.pkg"
        curl -fsSLO "https://www.python.org/ftp/python/${PY_VER}/${PKG}"
        sudo installer -pkg "${PKG}" -target /
        rm -f "${PKG}"
        PY_BIN_DIR="/Library/Frameworks/Python.framework/Versions/3.11/bin"
        # python.org 默认不创建无版本号的 python/pip 符号链接，自行补一下，便于后续 step 兼容
        sudo ln -sf "$PY_BIN_DIR/python3" "$PY_BIN_DIR/python"
        sudo ln -sf "$PY_BIN_DIR/pip3" "$PY_BIN_DIR/pip"
        # 把 python.org Python 的 bin 目录置于 PATH 最前
        echo "$PY_BIN_DIR" >> "$GITHUB_PATH"
        # 验证 universal2 双切片确实可用
        echo "--- ARM64 slice ---"
        arch -arm64 "$PY_BIN_DIR/python3" -c "import platform; print('arch:', platform.machine())"
        echo "--- x86_64 slice ---"
        arch -x86_64 "$PY_BIN_DIR/python3" -c "import platform; print('arch:', platform.machine())"

    - name: Install Python dependencies
      shell: bash
      run: |
        if [ "${{ matrix.rosetta }}" == "true" ]; then
          # Rosetta 路径：以 x86_64 进程执行 pip，pip 自动挑 x86_64 wheel
          arch -x86_64 python3 -m pip install --upgrade pip
          arch -x86_64 python3 -m pip install -r requirements/requirements.txt
          arch -x86_64 python3 -m pip install -r requirements/requirements-dev.txt
        else
          python -m pip install --upgrade pip
          pip install -r requirements/requirements.txt
          pip install -r requirements/requirements-dev.txt
          if [ "${{ runner.os }}" == "Windows" ]; then
            pip install pywin32
          fi
        fi

    - name: Install macOS build tools
      if: runner.os == 'macOS'
      run: |
        brew install create-dmg || true

    - name: Install Linux build tools
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev debhelper fakeroot

    - name: Resolve build version
      id: get_version
      shell: bash
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          VERSION="${GITHUB_REF#refs/tags/v}"
        else
          VERSION=$(python -c "import json; print(json.load(open('config/app.json', encoding='utf-8'))['version'])")
        fi
        echo "version=$VERSION" >> "$GITHUB_ENV"
        echo "Build version: $VERSION"

    - name: Configure PyInstaller separators
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          echo "PYINSTALLER_SEP=;" >> "$GITHUB_ENV"
          echo "PYINSTALLER_ADD_DATA_FORMAT=--add-data" >> "$GITHUB_ENV"
        else
          echo "PYINSTALLER_SEP=:" >> "$GITHUB_ENV"
          echo "PYINSTALLER_ADD_DATA_FORMAT=--add-data=" >> "$GITHUB_ENV"
        fi

    - name: Print build environment
      shell: bash
      run: |
        echo "============ Build Environment ============"
        echo "Runner OS:     ${{ runner.os }}"
        echo "Runner arch:   $(uname -m 2>/dev/null || echo unknown)"
        echo "Target:        ${{ matrix.platform }}-${{ matrix.arch }}"
        echo "Python:        $(python --version)"
        echo "Version:       ${{ env.version }}"
        echo "Working dir:   $(pwd)"
        echo "==========================================="

    - name: Build application
      shell: bash
      # 使用匿名维护者信息，避免硬编码个人邮箱在公开产物中
      env:
        JVMAN_DEB_MAINTAINER: "JVMan Maintainers <noreply@users.noreply.github.com>"
      run: |
        if [ "${{ matrix.rosetta }}" == "true" ]; then
          # Rosetta 路径：以 x86_64 进程跑 build.py，PyInstaller 子进程也是 x86_64,
          # 自然产出 x86_64 原生二进制（不带 ARM64 切片）
          arch -x86_64 python3 scripts/build.py \
            --platform ${{ matrix.platform }} \
            --arch ${{ matrix.arch }} \
            --type all
        else
          python scripts/build.py \
            --platform ${{ matrix.platform }} \
            --arch ${{ matrix.arch }} \
            --type all
        fi

    - name: List release directory
      shell: bash
      run: |
        echo "Release directory contents:"
        ls -R release/ || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.platform }}-${{ matrix.arch }}
        # 仅上传按平台+架构归档的目录里的最终产物
        path: |
          release/jvman_${{ env.version }}_${{ matrix.platform }}_${{ matrix.arch }}_*/jvman-*
          release/jvman_${{ env.version }}_${{ matrix.platform }}_${{ matrix.arch }}_*/release.json
        if-no-files-found: error
        retention-days: 14

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Resolve build version
      shell: bash
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          VERSION="${GITHUB_REF#refs/tags/v}"
        else
          VERSION=$(python -c "import json; print(json.load(open('config/app.json', encoding='utf-8'))['version'])")
        fi
        echo "version=$VERSION" >> "$GITHUB_ENV"

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release
        pattern: release-*
        merge-multiple: false

    - name: List downloaded artifacts
      shell: bash
      run: |
        echo "Downloaded artifacts:"
        ls -R release/ || true

    - name: Merge release.json files
      shell: bash
      run: |
        python - <<'PY'
        import json, glob, os

        merged = {
            "version": os.environ.get("version", ""),
            "files": [],
        }

        json_files = sorted(glob.glob("release/**/release.json", recursive=True))
        print(f"Found {len(json_files)} release.json files")

        for jf in json_files:
            print(f"Processing {jf}")
            try:
                with open(jf, "r", encoding="utf-8") as f:
                    data = json.load(f)
                for item in data.get("files", []):
                    # 保证每条记录都带有 platform/arch，便于客户端挑选
                    item.setdefault("platform", data.get("platform"))
                    item.setdefault("arch", data.get("arch"))
                    merged["files"].append(item)
            except Exception as e:
                print(f"Error processing {jf}: {e}")

        os.makedirs("release", exist_ok=True)
        with open("release/release.json", "w", encoding="utf-8") as f:
            json.dump(merged, f, indent=2, ensure_ascii=False)
        print("Merged release.json created successfully")
        PY

    - name: Stage release assets
      shell: bash
      run: |
        mkdir -p release/_assets
        # 收集所有安装包 / 便携包 / 校验文件
        shopt -s globstar nullglob
        for f in release/release-*/**/jvman-*.{exe,zip,dmg,deb,sha256}; do
          echo "Staging $f"
          cp -f "$f" release/_assets/
        done
        cp -f release/release.json release/_assets/ || true
        echo "Final asset list:"
        ls -la release/_assets/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/_assets/*
        body_path: CHANGELOG.md
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}